# 운영 스타일 스택: Next 앱 + Postgres + 업로드 볼륨
# 사용: docker compose up --build
services:
  db:
    image: postgres:16-alpine
    container_name: next-trpc-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-board}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-board}
      POSTGRES_DB: ${DB_NAME:-board}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: next-trpc-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-board}
      DB_PASSWORD: ${DB_PASSWORD:-board}
      DB_NAME: ${DB_NAME:-board}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-dev_only_nextauth_secret_min_32_chars_long!!}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      UPLOADS_DIR: /app/uploads
    volumes:
      - app_uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:3000/api/health >/dev/null || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

volumes:
  postgres_data:
  app_uploads:
